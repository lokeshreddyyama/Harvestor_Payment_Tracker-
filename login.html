<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Harvester Payment Tracker</title>
    <link rel="icon" type="image/x-icon" href="/uploads/photos/Harveterlogo.jpg" style="border-radius:10px;">
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            text-align: center;
        }

        .auth-logo {
            font-size: 3.5rem;
            margin-bottom: 5px;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5));
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .auth-title {
            color: var(--primary-gold);
            margin-bottom: 5px;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .auth-subtitle {
            font-family: var(--font-body);
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-family: var(--font-heading);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 2px solid transparent;
        }

        .auth-tab.active {
            color: var(--primary-gold);
            border-bottom-color: var(--primary-gold);
        }

        .auth-form {
            display: none;
            text-align: left;
            animation: fadeIn 0.4s ease;
        }

        .auth-form.active {
            display: block;
        }

        .auth-footer {
            margin-top: 24px;
            font-size: 0.8rem;
            color: var(--text-subtle);
        }

        .btn-full {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="glass-card auth-container fade-in">
        <div class="auth-logo">🌾</div>
        <h1 class="auth-title">Harvester Tracker</h1>
        <p class="auth-subtitle">హార్వెస్టర్ చెల్లింపు నిర్వాహణ వ్యవస్థ</p>

        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">Login</button>
            <button class="auth-tab" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <form id="formLogin" class="auth-form active" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" id="l_user" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="l_pass" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="btnLogin">Sign In 🔐</button>
        </form>

        <!-- Register Form -->
        <form id="formRegister" class="auth-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label class="form-label">Full Name *</label>
                <input type="text" id="r_name" class="form-control" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <label class="form-label">Username *</label>
                <input type="text" id="r_user" class="form-control" placeholder="Unique username" required 
                       onblur="checkUsername(this.value)">
                <small id="userCheckMsg" style="margin-top:4px;display:block;font-size:0.75rem"></small>
            </div>
            <div class="form-group">
                <label class="form-label">Vehicle Registration (Optional)</label>
                <input type="text" id="r_vehicle" class="form-control" placeholder="e.g. AP 15 AA 1234">
            </div>
            <div class="form-group">
                <label class="form-label">Password *</label>
                <input type="password" id="r_pass" class="form-control" placeholder="Create password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="btnRegister">Create Account 🚀</button>
        </form>

        <div class="auth-footer">
            Securely tracking your harvester payments and fuel statistics.
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script>
        // Redirect if already logged in
        if (ApiService.getToken()) {
            window.location.href = 'index.html';
        }

        // UI Toast
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span style="font-size:1.2rem">${type === 'success' ? '✅' : '❌'}</span>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // Tabs
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab === 'login' ? 'formLogin' : 'formRegister').classList.add('active');
        }

        // Login Submit
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const originalText = btn.innerHTML;
            
            try {
                btn.disabled = true;
                btn.innerHTML = '<div class="loader" style="width:18px;height:18px"></div> Logging in...';
                
                const credentials = {
                    username: document.getElementById('l_user').value.trim(),
                    password: document.getElementById('l_pass').value
                };

                const res = await ApiService.login(credentials);
                
                // Save session
                ApiService.setToken(res.data.token);
                sessionStorage.setItem('ht_name', res.data.user.name);
                sessionStorage.setItem('ht_username', res.data.user.username);
                
                showToast('Login successful! Redirecting...');
                setTimeout(() => window.location.href = 'index.html', 800);
                
            } catch (err) {
                showToast(err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        let isUsernameValid = false;

        async function checkUsername(username) {
            const msg = document.getElementById('userCheckMsg');
            if(!username.trim()) { msg.textContent = ''; return; }
            
            try {
                const res = await ApiService.checkUsername(username);
                if (res.data.available) {
                    msg.innerHTML = '<span class="text-green">Username is available!</span>';
                    isUsernameValid = true;
                } else {
                    msg.innerHTML = '<span class="text-danger">Username already taken.</span>';
                    isUsernameValid = false;
                }
            } catch (err) {
                console.error('Validation error', err);
            }
        }

        // Register Submit
        async function handleRegister(e) {
            e.preventDefault();
            if (!isUsernameValid) {
                showToast('Please choose a valid & available username.', 'error');
                return;
            }

            const btn = document.getElementById('btnRegister');
            const originalText = btn.innerHTML;
            
            try {
                btn.disabled = true;
                btn.innerHTML = '<div class="loader" style="width:18px;height:18px"></div> Creating API...';
                
                const data = {
                    name: document.getElementById('r_name').value.trim(),
                    username: document.getElementById('r_user').value.trim(),
                    password: document.getElementById('r_pass').value,
                    vehicleRegistration: document.getElementById('r_vehicle').value.trim()
                };

                await ApiService.register(data);
                showToast('Account created successfully! Please login.');
                
                setTimeout(() => switchTab('login'), 1200);
                
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }
    </script>
</body>
</html>
