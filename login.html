<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvester Tracker — Login</title>
     <link rel="icon" type="image/x-icon" href="./uploads/photos/Harveterlogo.jpg" style="border-radius:10px;">
<link href="https://fonts.googleapis.com/css2?family=Tiro+Telugu&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c; --gold-light: #e8c97a;
  --dark: #0f1a0f; --dark2: #162516; --dark3: #1e321e;
  --green: #2d6a2d; --green-light: #4a9e4a; --green-bright: #6fcf6f;
  --red: #c0392b; --amber: #e67e22;
  --text: #e8f0e8; --text-muted: #8aaa8a;
  --border: rgba(201,168,76,0.25);
  --card-bg: rgba(22,37,22,0.95);
  --input-bg: rgba(15,26,15,0.8);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Rajdhani',sans-serif; background:var(--dark); color:var(--text);
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(45,106,45,0.18) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.1) 0%, transparent 50%),
    repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(201,168,76,0.03) 40px,rgba(201,168,76,0.03) 41px),
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(201,168,76,0.03) 40px,rgba(201,168,76,0.03) 41px);
  padding:20px;
}
.wrapper { width:100%; max-width:430px; }
.brand { text-align:center; margin-bottom:28px; }
.brand .ico { font-size:3.2rem; filter:drop-shadow(0 0 16px rgba(201,168,76,0.6)); display:block; margin-bottom:8px; }
.brand h1 { font-size:1.8rem; font-weight:700; color:var(--gold); letter-spacing:2px; }
.brand p  { font-size:0.82rem; color:var(--text-muted); font-family:'Tiro Telugu',serif; margin-top:3px; }
.card {
  background:var(--card-bg); border:1px solid var(--border); border-radius:16px;
  padding:32px 28px; backdrop-filter:blur(12px);
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  position:relative; overflow:hidden;
}
.card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg,var(--gold),var(--green-bright),var(--gold));
}
.tabs { display:flex; gap:0; margin-bottom:24px; border:1.5px solid var(--border); border-radius:9px; overflow:hidden; }
.tab-btn {
  flex:1; padding:9px; background:transparent; border:none; cursor:pointer;
  font-family:'Rajdhani',sans-serif; font-size:0.95rem; font-weight:600;
  color:var(--text-muted); transition:all 0.2s;
}
.tab-btn.active { background:var(--gold); color:var(--dark); }
.form-panel { display:none; }
.form-panel.active { display:block; }
.form-group { display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
.form-group label { font-size:0.76rem; color:var(--gold-light); font-weight:600; letter-spacing:0.5px; }
.input-wrap { position:relative; }
.input-wrap .input-ico {
  position:absolute; left:11px; top:50%; transform:translateY(-50%);
  font-size:1rem; pointer-events:none;
}
.form-group input {
  width:100%; padding:9px 12px 9px 36px;
  background:var(--input-bg); border:1.5px solid rgba(201,168,76,0.2);
  border-radius:8px; color:var(--text); font-family:'Rajdhani',sans-serif;
  font-size:0.97rem; outline:none; transition:border-color 0.2s;
}
.form-group input:focus {
  border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,168,76,0.1);
}
.form-group input::placeholder { color:rgba(138,170,138,0.5); }
.show-pw {
  position:absolute; right:11px; top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer; color:var(--text-muted);
  font-size:0.9rem; padding:2px 4px;
}
.show-pw:hover { color:var(--gold); }
.btn-main {
  width:100%; padding:11px; border:none; border-radius:9px; cursor:pointer;
  font-family:'Rajdhani',sans-serif; font-size:1.05rem; font-weight:700;
  background:linear-gradient(135deg,var(--gold),#a8832e); color:var(--dark);
  letter-spacing:0.5px; transition:filter 0.2s, transform 0.1s; margin-top:6px;
}
.btn-main:hover:not(:disabled) { filter:brightness(1.12); }
.btn-main:active { transform:scale(0.98); }
.btn-main:disabled { opacity:0.55; cursor:not-allowed; }
.divider { text-align:center; color:var(--text-muted); font-size:0.77rem; margin:12px 0; position:relative; }
.divider::before,.divider::after { content:''; position:absolute; top:50%; width:38%; height:1px; background:var(--border); }
.divider::before { left:0; } .divider::after { right:0; }
.err-box {
  background:rgba(192,57,43,0.14); border:1px solid rgba(192,57,43,0.5);
  border-radius:7px; padding:9px 13px; color:#e74c3c;
  font-size:0.84rem; margin-bottom:14px; display:none; line-height:1.5;
}
.err-box.show { display:block; }
.ok-box {
  background:rgba(45,106,45,0.2); border:1px solid rgba(111,207,111,0.4);
  border-radius:7px; padding:9px 13px; color:var(--green-bright);
  font-size:0.84rem; margin-bottom:14px; display:none;
}
.ok-box.show { display:block; }
.pw-strength { height:4px; border-radius:2px; margin-top:5px; background:var(--dark3); overflow:hidden; }
.pw-strength-bar { height:100%; border-radius:2px; transition:width 0.3s,background 0.3s; width:0%; }
.hint { font-size:0.73rem; color:var(--text-muted); margin-top:2px; }
.spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(0,0,0,0.3); border-top-color:#111; border-radius:50%; animation:sp 0.6s linear infinite; vertical-align:middle; margin-right:5px; }
@keyframes sp { to{transform:rotate(360deg)} }
.footer-note { text-align:center; margin-top:18px; font-size:0.77rem; color:var(--text-muted); }
</style>
</head>
<body>
<div class="wrapper">
  <div class="brand">
    <span class="ico">🌾</span>
    <h1>HARVESTER TRACKER</h1>
    <p>హార్వెస్టర్ చెల్లింపు నిర్వాహణ వ్యవస్థ</p>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">🔑 Login</button>
      <button class="tab-btn" id="registerTab" onclick="switchTab('register')">📝 Register</button>
    </div>

    <!-- LOGIN -->
    <div class="form-panel active" id="loginPanel">
      <div class="err-box" id="loginErr"></div>
      <div class="ok-box"  id="loginOk"></div>
      <div class="form-group">
        <label>Username / యూజర్‌నేమ్</label>
        <div class="input-wrap">
          <span class="input-ico">👤</span>
          <input type="text" id="l_user" placeholder="Enter your username" autocomplete="username">
        </div>
      </div>
      <div class="form-group">
        <label>Password / పాస్‌వర్డ్</label>
        <div class="input-wrap">
          <span class="input-ico">🔒</span>
          <input type="password" id="l_pass" placeholder="Enter your password" autocomplete="current-password"
            onkeydown="if(event.key==='Enter')doLogin()">
          <button class="show-pw" type="button" onclick="togglePw('l_pass',this)">👁️</button>
        </div>
      </div>
      <button class="btn-main" id="loginBtn" onclick="doLogin()">🔑 Login / లాగిన్ అవ్వు</button>
      <div class="divider">or</div>
      <div style="text-align:center;font-size:0.82rem;color:var(--text-muted)">
        Don't have an account?
        <a style="color:var(--gold);cursor:pointer" onclick="switchTab('register')">Register here →</a>
      </div>
    </div>

    <!-- REGISTER -->
    <div class="form-panel" id="registerPanel">
      <div class="err-box" id="regErr"></div>
      <div class="ok-box"  id="regOk"></div>
      <div class="form-group">
        <label>Full Name / పూర్తి పేరు *</label>
        <div class="input-wrap">
          <span class="input-ico">🧑</span>
          <input type="text" id="r_name" placeholder="Your full name" autocomplete="name">
        </div>
      </div>
      <div class="form-group">
        <label>Username / యూజర్‌నేమ్ *</label>
        <div class="input-wrap">
          <span class="input-ico">👤</span>
          <input type="text" id="r_user" placeholder="Choose a username" autocomplete="username"
            oninput="checkUser(this.value)">
        </div>
        <div class="hint" id="userHint"></div>
      </div>
      <div class="form-group">
        <label>Phone / ఫోన్ నంబర్</label>
        <div class="input-wrap">
          <span class="input-ico">📞</span>
          <input type="tel" id="r_phone" placeholder="10-digit mobile number">
        </div>
      </div>
      <div class="form-group">
        <label>Vehicle Number / వాహన నంబర్</label>
        <div class="input-wrap">
          <span class="input-ico">🚜</span>
          <input type="text" id="r_vehicle" placeholder="e.g. AP 15 AA 1234">
        </div>
      </div>
      <div class="form-group">
        <label>Password / పాస్‌వర్డ్ *</label>
        <div class="input-wrap">
          <span class="input-ico">🔒</span>
          <input type="password" id="r_pass" placeholder="Min 6 characters" autocomplete="new-password"
            oninput="checkStrength(this.value)">
          <button class="show-pw" type="button" onclick="togglePw('r_pass',this)">👁️</button>
        </div>
        <div class="pw-strength"><div class="pw-strength-bar" id="pwBar"></div></div>
        <div class="hint" id="pwHint"></div>
      </div>
      <div class="form-group">
        <label>Confirm Password / నిర్ధారించు *</label>
        <div class="input-wrap">
          <span class="input-ico">🔑</span>
          <input type="password" id="r_pass2" placeholder="Repeat password" autocomplete="new-password"
            onkeydown="if(event.key==='Enter')doRegister()">
          <button class="show-pw" type="button" onclick="togglePw('r_pass2',this)">👁️</button>
        </div>
      </div>
      <button class="btn-main" id="regBtn" onclick="doRegister()">📝 Register / నమోదు చేయి</button>
      <div class="divider">or</div>
      <div style="text-align:center;font-size:0.82rem;color:var(--text-muted)">
        Already have an account?
        <a style="color:var(--gold);cursor:pointer" onclick="switchTab('login')">Login here →</a>
      </div>
    </div>
  </div>
  <div class="footer-note">
    🌾 Harvester Tracker · Built for farmers &amp; operators<br>
    <span style="font-family:'Tiro Telugu',serif">వ్యవసాయదారులు & ఆపరేటర్ల కోసం నిర్మించబడింది</span>
  </div>
</div>

<script>
const API = 'api.php';

function switchTab(tab) {
  document.getElementById('loginPanel').classList.toggle('active', tab==='login');
  document.getElementById('registerPanel').classList.toggle('active', tab==='register');
  document.getElementById('loginTab').classList.toggle('active', tab==='login');
  document.getElementById('registerTab').classList.toggle('active', tab==='register');
  clearMsgs();
}
function clearMsgs() {
  ['loginErr','loginOk','regErr','regOk'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('show'); el.textContent='';
  });
}
function showErr(id, msg) { const el=document.getElementById(id); el.textContent=msg; el.classList.add('show'); }
function showOk(id, msg)  { const el=document.getElementById(id); el.textContent=msg; el.classList.add('show'); }

function togglePw(inputId, btn) {
  const inp = document.getElementById(inputId);
  inp.type  = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
}

function checkStrength(pw) {
  const bar=document.getElementById('pwBar'), hint=document.getElementById('pwHint');
  if (!pw) { bar.style.width='0%'; hint.textContent=''; return; }
  let score=0;
  if (pw.length>=6)  score++;
  if (pw.length>=10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const levels=[[0,'0%','transparent',''],[1,'25%','#e74c3c','Weak'],[2,'50%','#e67e22','Fair'],[3,'70%','#f1c40f','Good'],[4,'85%','#2ecc71','Strong'],[5,'100%','#27ae60','Very Strong']];
  const [,w,c,l]=levels[Math.min(score,5)];
  bar.style.width=w; bar.style.background=c; hint.textContent=l; hint.style.color=c;
}

let userTimer=null;
async function checkUser(val) {
  const hint=document.getElementById('userHint');
  clearTimeout(userTimer);
  if (!val||val.length<3) { hint.textContent='Min 3 characters'; hint.style.color='var(--text-muted)'; return; }
  hint.textContent='⏳ Checking…'; hint.style.color='var(--text-muted)';
  userTimer=setTimeout(async()=>{
    try {
      const res=await fetch(`${API}?action=check_user&username=${encodeURIComponent(val)}`);
      const data=await res.json();
      if (data.available) { hint.textContent='✅ Username available!'; hint.style.color='var(--green-bright)'; }
      else { hint.textContent='❌ Username taken'; hint.style.color='#e74c3c'; }
    } catch(e) { hint.textContent=''; }
  },600);
}

async function doLogin() {
  clearMsgs();
  const username=document.getElementById('l_user').value.trim();
  const password=document.getElementById('l_pass').value;
  if (!username||!password) { showErr('loginErr','⚠️ Please enter both username and password'); return; }
  const btn=document.getElementById('loginBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Logging in…';
  try {
    const res=await fetch(API+'?action=login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const data=await res.json();
    if (data.success) {
      showOk('loginOk','✅ Login successful! Redirecting…');
      sessionStorage.setItem('ht_token',   data.data.token);
      sessionStorage.setItem('ht_user_id', data.data.user.id);
      sessionStorage.setItem('ht_name',    data.data.user.name);
      sessionStorage.setItem('ht_username',data.data.user.username);
      setTimeout(()=>{ window.location.href='index.php'; },900);
    } else { showErr('loginErr','❌ '+(data.error||'Login failed')); }
  } catch(e) { showErr('loginErr','❌ Cannot connect to server.'); }
  finally { btn.disabled=false; btn.innerHTML='🔑 Login / లాగిన్ అవ్వు'; }
}

async function doRegister() {
  clearMsgs();
  const name    =document.getElementById('r_name').value.trim();
  const username=document.getElementById('r_user').value.trim();
  const phone   =document.getElementById('r_phone').value.trim();
  const vehicle =document.getElementById('r_vehicle').value.trim().toUpperCase();
  const password=document.getElementById('r_pass').value;
  const confirm =document.getElementById('r_pass2').value;
  if (!name||!username||!password) { showErr('regErr','⚠️ Name, username and password are required'); return; }
  if (username.length<3) { showErr('regErr','⚠️ Username must be at least 3 characters'); return; }
  if (!/^[a-zA-Z0-9_]+$/.test(username)) { showErr('regErr','⚠️ Username: only letters, numbers, underscores'); return; }
  if (password.length<6) { showErr('regErr','⚠️ Password must be at least 6 characters'); return; }
  if (password!==confirm) { showErr('regErr','⚠️ Passwords do not match'); return; }
  const btn=document.getElementById('regBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Registering…';
  try {
    const res=await fetch(API+'?action=register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,username,phone,vehicle,password})});
    const data=await res.json();
    if (data.success) {
      showOk('regOk','✅ Account created! You can now login.');
      ['r_name','r_user','r_phone','r_vehicle','r_pass','r_pass2'].forEach(id=>document.getElementById(id).value='');
      document.getElementById('pwBar').style.width='0%';
      setTimeout(()=>switchTab('login'),1800);
    } else { showErr('regErr','❌ '+(data.error||'Registration failed')); }
  } catch(e) { showErr('regErr','❌ Cannot connect to server.'); }
  finally { btn.disabled=false; btn.innerHTML='📝 Register / నమోదు చేయి'; }
}

if (sessionStorage.getItem('ht_token')) window.location.href='index.php';
</script>
</body>
</html>
