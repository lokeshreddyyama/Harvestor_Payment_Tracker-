spring.application.name=harvester-backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/harvester?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT Secret (In production it should be stored in env variables)
jwt.secret=harvesterPaymentTrackerSuperSecretKey1234567890abcdefghijklmnopqrstuvwxyz

# Server Configuration
server.port=8080

# Logging
logging.level.com.harvester=DEBUG
logging.level.org.springframework.security=DEBUG
jwt.expirationMs=86400000

# File Upload Directory
file.upload-dir=uploads
